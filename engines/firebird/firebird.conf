# Firebird 5.0.1 Configuration for Benchmarks
# Optimized for testing - not production settings

# Authentication
AuthServer = Srp, Legacy_Auth
AuthClient = Srp, Legacy_Auth
UserManager = Srp, Legacy_UserManager
WireCrypt = Enabled

# Memory settings (adjust based on available RAM)
DefaultDbCachePages = 2048
TempCacheLimit = 64M

# Connection settings
MaxUnflushedWrites = 1000
MaxUnflushedWriteTime = 5

# Lock settings
LockHashSlots = 101
LockMemSize = 1M

# Threading
CpuAffinityMask = 1

# Logging
# Log to stdout for Docker
LogFile = 
# LogErrorsToStderr = true

# Remote access
RemoteAccess = true

# Database creation
CreateDatabasePath = /firebird/data
